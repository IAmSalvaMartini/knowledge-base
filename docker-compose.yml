version: "3.8"

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: wikijs
      POSTGRES_USER: wikijs
      POSTGRES_PASSWORD: ${WIKIJS_DB_PASSWORD:-changeme}
    volumes:
      - wikijs_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wikijs"]
      interval: 10s
      timeout: 5s
      retries: 5

  wikijs:
    image: requarks/wiki:2
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DB_TYPE: postgres
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: wikijs
      DB_USER: wikijs
      DB_PASS: ${WIKIJS_DB_PASSWORD:-changeme}
    volumes:
      - wikijs_data:/wiki/data

  kb:
    build: .
    restart: unless-stopped
    ports:
      - "5057:5057"
    env_file: .env
    volumes:
      - kb_chroma:/app/data/chroma
      - kb_uploads:/app/data/uploads
      - kb_mirror:/app/content_mirror

volumes:
  wikijs_db:
  wikijs_data:
  kb_chroma:
  kb_uploads:
  kb_mirror:
