<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload to Knowledge Base</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; padding: 2rem; }
    .card { max-width: 520px; margin: 2rem auto; background: #fff; border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,.12); padding: 2rem; }
    h1 { font-size: 1.4rem; margin-bottom: 1.25rem; }
    .alert { padding: .75rem 1rem; border-radius: 4px; margin-bottom: 1rem; font-size: .9rem; }
    .alert-error   { background: #fee2e2; color: #991b1b; }
    .alert-success { background: #dcfce7; color: #166534; }
    label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: .4rem; }
    .hint { font-size: .8rem; color: #666; margin-bottom: 1rem; }
    input[type=file] { display: block; width: 100%; padding: .5rem; border: 1px dashed #ccc;
                       border-radius: 4px; background: #fafafa; margin-bottom: 1.25rem; cursor: pointer; }
    button { background: #2563eb; color: #fff; border: none; border-radius: 4px;
             padding: .65rem 1.5rem; font-size: .95rem; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    .user { font-size: .8rem; color: #555; margin-bottom: 1.25rem; }
    a.logout { color: #2563eb; font-size: .8rem; }
  </style>
</head>
<body>
<div class="card">
  <h1>Upload to Knowledge Base</h1>

  {% if session.user %}
  <p class="user">Signed in as {{ session.user.email }} — <a class="logout" href="/auth/logout">Sign out</a></p>
  {% endif %}

  {% for category, message in get_flashed_messages(with_categories=true) %}
  <div class="alert alert-{{ category }}">{{ message }}</div>
  {% endfor %}

  <form method="POST" enctype="multipart/form-data">
    <label for="file">Select document</label>
    <p class="hint">Allowed types: {{ supported | join(', ') }} &nbsp;·&nbsp; Max size: {{ max_upload_mb }} MB</p>
    <input type="file" id="file" name="file" accept="{{ supported | join(',') }}">
    <button type="submit">Upload &amp; Ingest</button>
  </form>
</div>
</body>
</html>
